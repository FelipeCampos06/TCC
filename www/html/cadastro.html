<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>

<link rel="stylesheet" href="../css/cadastro.css">

<body>

    <button type="submit"  class="cadastro" onclick="window.location.href='../html/selecao.html'">Cadastre-se</button>

    <form>
        <input type="text" class="nome" placeholder="Digite seu nome completo" >
        <input type="email" class="email" placeholder="Digite seu email">
        <input type="password" class="senha" placeholder="Digite sua senha" >
        <input type="password" class="confsenha" placeholder="Confirme sua Senha">
        <input type="number" class="tell" placeholder="Digite seu telefone" >
    
    </form>

<script src="../js/cadastro.js"></script>

</body>

</html>
