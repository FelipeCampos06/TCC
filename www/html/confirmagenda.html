<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento</title>
    <link rel="stylesheet" href="../css/confirmagenda.css">
</head>

<body>

    <div class="voltar">
        <a href="../html/servicos.html">
            <img src="../img/seta.png"></a>
    </div>

    <div class="prg">
        <p>Em caso de cancelamento avisar com 4 horas de antecedência!<p>
    </div>

    <div class="fun">
        <div class="confirmar">
            <div class="info-header">
                <p>Informações do Agendamento</p>
            </div>

            <div class="info-detalhes">
                <div class="info-item">
                    <span class="info-label">Serviço:</span>
                    <span class="info-valor" id="infoServico">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Valor:</span>
                    <span class="info-valor" id="infoValor">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Dia:</span>
                    <span class="info-valor" id="infoDia">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Horário:</span>
                    <span class="info-valor" id="infoHorario">-</span>
                </div>
            </div>

            <div class="conf-separator"></div>

            <div class="info-header">
                <p>Confirmar Agendamento?</p>
            </div>

            <div class="botao">
                <button class="sim" onclick="window.location.href='../html/confirmado.html'">
                    SIM
                </button>

                <button class="nao" onclick="window.location.href='../html/agenda.html'">
                    NÃO
                </button>
            </div>

        </div>
    </div>

<script src="../js/confirmagenda.js"></script>

</body>

</html>
