<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Confirmado</title>
    <link rel="stylesheet" href="../css/confirmado.css">
</head>

<body>
    <div class="voltar">
        <a href="../html/selecao.html">
            <img src="../img/seta.png"></a>
    </div>


    <div class="fun">
        <div class="confirmar">
            <div class="info-header">
                <p>✓ AGENDAMENTO CONFIRMADO!</p>
            </div>

            <div class="info-detalhes">
                <div class="info-item">
                    <span class="info-label">Serviço:</span>
                    <span class="info-valor" id="detalhesServico">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Valor:</span>
                    <span class="info-valor" id="detalhesValor">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Dia:</span>
                    <span class="info-valor" id="detalhesDia">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Horário:</span>
                    <span class="info-valor" id="detalhesHorario">-</span>
                </div>
                <div class="info-item" style="border-bottom: none;">
                    <span class="info-label">Data da Confirmação:</span>
                    <span class="info-valor" id="detalhesData" style="font-size: 14px;">-</span>
                </div>
            </div>
        </div>
    </div>

<script src="../js/confirmado.js"></script>

</body>

</html>
