<!DOCTYPE html>
<html lang="pt-BR">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbeiro</title>
    <link rel="stylesheet" href="../css/barbeiro.css">
</head>
 
<body>
 
 
 
 
    <div class="opcoes">
        <!-- Agendamento -->
        <a href="../html/agenda.html" class="opcao">
            <img src="../img/agendar.png" alt="Agendamento" class="icone">
        </a>
 
        <!-- Perfil -->
        <a href="perfil.html" class="perfil">
            <img src="../img/perfil.png" alt="Perfil" class="icone-perfil">
        </a>
    </div>
    <!-- CONTEÚDO PRINCIPAL -->
    <div class="container">
        <h2 class="titulo"><strong>Próximos Horários </strong></h2>
 
        <div class="cards-container">
            <div class="card">
                <span class="status verde"></span>
                <h3>Andre</h3>
                <p class="hora-card">11:00</p>
                <p class="servico">Corte + Barba</p>
                <p class="tempo">1hr</p>
            </div>
 
            <div class="card">
                <span class="status amarelo"></span>
                <h3>Felipe</h3>
                <p class="hora-card">12:00</p>
                <p class="servico">Corte</p>
                <p class="tempo">30min</p>
            </div>
 
            <div class="card">
                <span class="status vermelho"></span>
                <h3>Gabriel</h3>
                <p class="hora-card">14:00</p>
                <p class="servico">Barba</p>
                <p class="tempo">30min</p>
            </div>
 
            <div class="card">
                <span class="status vermelho"></span>
                <h3>Gustavo</h3>
                <p class="hora-card">15:00</p>
                <p class="servico">Corte + Barba</p>
                <p class="tempo">1hr</p>
            </div>
        </div>
</body>
 
</html>
